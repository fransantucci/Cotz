name: Cotizaciones Bot

on:
  schedule:
    # Ejecuta cada 30 minutos entre las 12:00 y 21:00 UTC (09:00 a 18:00 Argentina)
    - cron: '*/120 13-20 * * 1-5'
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Verificar secreto TELEGRAM_TOKEN
      run: |
        echo "Longitud del token: ${#TELEGRAM_TOKEN}"
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

#    - name: Restaurar cache del JSON
#      uses: actions/cache@v4
#      with:
#        path: ultimo_valor.json
#        key: ultimo_valor-cache

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar bot
      run: |
        python CotzBot.py
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

#    - name: Guardar cache actualizado
#      uses: actions/cache@v4
#      with:
#        path: ultimo_valor.json
#        key: ultimo_valor-cache









